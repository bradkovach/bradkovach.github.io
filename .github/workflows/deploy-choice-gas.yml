name: Deploy choice-gas

on:
    push:
        branches:
            - main
        paths:
            - 'projects/choice-gas/**'
            - '.github/workflows/deploy-choice-gas.yml'
    schedule:
        # Every 4 hours
        - cron: '0 */4 * * *'
    workflow_dispatch:

concurrency:
    group: deploy-choice-gas
    cancel-in-progress: true

env:
    # SSH connection details for deployment
    SSH_REMOTE_USER: uwacwy
    SSH_REMOTE_HOST: choicegas.unitedwayalbanycounty.org
    SSH_REMOTE_PATH: ~/sites/choicegas.unitedwayalbanycounty.org/www

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure SSH
              run: |
                  install -d -m 700 ~/.ssh
                  printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa

                  ssh-keyscan -H -t rsa,ecdsa,ed25519 ${{ env.SSH_REMOTE_HOST }} > ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

                  cat > ~/.ssh/config <<'EOF'
                  Host ChoiceGas
                    HostName ${{ env.SSH_REMOTE_HOST }}
                    User ${{ env.SSH_REMOTE_USER }}
                    IdentityFile ~/.ssh/id_rsa
                    IdentitiesOnly yes
                  EOF
                  chmod 600 ~/.ssh/config

                  echo "<<<<< ls -l ~/.ssh"
                  ls -l ~/.ssh
                  echo "<<<<< ls -l ~/.ssh"

                  echo "<<<<< PUBLIC KEY"
                  ssh-keygen -y -f ~/.ssh/id_rsa
                  echo "<<<<< PUBLIC KEY"
                  echo

                  echo "<<<<< SSH Config"
                  cat ~/.ssh/config
                  echo "<<<<< SSH Config"

                  echo "<<<<< ~/.ssh/known_hosts"
                  cat ~/.ssh/known_hosts
                  echo "<<<<< ~/.ssh/known_hosts"

                  ssh -vvv ChoiceGas "echo SSH connection successful"

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Update Price Data
              run: |
                  npm run choice-gas
                  npm run update-last-updated
                  npm run choice-gas:build:production
              env:
                  BHES_ACCOUNT_NUMBER: ${{ secrets.BHES_ACCOUNT_NUMBER }}
                  BHE_PREMISE_ID: ${{ secrets.BHE_PREMISE_ID }}

            - name: Deploy to server
              run: >
                  rsync 
                  -avz
                  --exclude '.htaccess'
                  --exclude '.well-known'
                  dist/choice-gas/browser/
                  ChoiceGas:${{ env.SSH_REMOTE_PATH }}
