name: Deploy choice-gas

on:
    push:
        branches:
            - main
        paths:
            - 'projects/choice-gas/**'
    schedule:
        # Every 4 hours
        - cron: '0 */4 * * *'
    workflow_dispatch:

# Cancel an in-progress run if a newer one is triggered for the same branch/schedule.
concurrency:
    group: deploy-choice-gas
    cancel-in-progress: false

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build choice-gas
              run: npx ng build choice-gas --configuration production

            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

            - name: Deploy via rsync
              run: |
                  rsync -azv --delete \
                    -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
                    dist/choice-gas/browser/ \
                    ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}/

            - name: Clean up SSH key
              if: always()
              run: rm -f ~/.ssh/deploy_key
